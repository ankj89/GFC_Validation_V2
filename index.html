<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        GFC Validation Tool V3
    </title>

    <link
        rel="stylesheet"
        href="css/style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

</head>

<body>

<!-- ===================================== -->
<!-- HEADER -->
<!-- ===================================== -->

<header>

    <h1>
        GFC Validation Tool - Version 3
    </h1>

</header>

<!-- ===================================== -->
<!-- UPLOADS -->
<!-- ===================================== -->

<section class="upload-section">

    <div class="upload-card">

        <label>
            Upload BOQ PDF
        </label>

        <input
            type="file"
            id="boqPdfInput"
            accept=".pdf">

    </div>

    <div class="upload-card">

        <label>
            Upload GFC PDF
        </label>

        <input
            type="file"
            id="gfcPdfInput"
            accept=".pdf">

    </div>

</section>

<!-- ===================================== -->
<!-- BOQ REVIEW -->
<!-- ===================================== -->

<section
    id="boqReviewSection"
    style="display:none;">

    <h2>
        BOQ Review
    </h2>

    <p>

        Review extracted Room and Item mappings.
        Add missing rows if parser missed anything.

    </p>

    <table
        class="report-table">

        <thead>

            <tr>

                <th>
                    Room
                </th>

                <th>
                    Item Name
                </th>

                <th>
                    Action
                </th>

            </tr>

        </thead>

        <tbody
            id="boqReviewTableBody">

        </tbody>

    </table>

    <div
        style="
            display:flex;
            gap:10px;
            margin-top:20px;
        ">

        <button
            id="addBoqRowBtn">

            Add Row

        </button>

        <button
            id="continueValidationBtn">

            Continue To Validation

        </button>

    </div>

</section>

<!-- ===================================== -->
<!-- VALIDATION -->
<!-- ===================================== -->

<section
    class="main-layout"
    style="display:none;">

    <!-- LEFT -->

    <div class="viewer-panel">

        <div
            class="viewer-toolbar">

            <button
                id="prevPageBtn">

                Previous

            </button>

            <span>

                Page

                <span
                    id="currentPage">

                    1

                </span>

                /

                <span
                    id="totalPages">

                    0

                </span>

            </span>

            <button
                id="nextPageBtn">

                Next

            </button>

        </div>

        <canvas
            id="pdfCanvas">

        </canvas>

    </div>

    <!-- RIGHT -->

    <div
        class="validation-panel">

        <h2>
            Validation
        </h2>

        <!-- ROOM -->

        <label>
            Room
        </label>

        <select
            id="roomDropdown">

            <option value="">
                Select Room
            </option>

        </select>

        <!-- ITEMS -->

        <label>

            Which Item Names are visible in this drawing?

        </label>

        <select
            id="itemDropdown"
            multiple>

        </select>
        <h4>
Items Visible In Drawing But Missing In BOQ
</h4>

<div id="extraItemsContainer">
</div>

<button
type="button"
id="addExtraItemBtn">

Add Extra Item

</button>

        <!-- MANUAL ITEM -->

        <label>
            Add Item if missing
        </label>

        <div
            class="manual-item-container">

            <input
                type="text"
                id="manualItemInput"
                placeholder="Enter Item Name">

            <button
                type="button"
                id="addManualItemBtn">

                Add Item

            </button>

        </div>

        <!-- CATEGORY -->

        <label>
            Drawing Category
        </label>

        <select
            id="categoryDropdown"
            multiple>

            <option value="falseCeiling">
                False Ceiling
            </option>

            <option value="electrical">
                Electrical
            </option>

            <option value="plumbing">
                Plumbing
            </option>

            <option value="flooring">
                Flooring
            </option>

            <option value="carpentry">
                Carpentry
            </option>

            <option value="elevation">
                Elevation
            </option>

            <option value="ac">
                AC
            </option>

            <option value="civil">
                Civil
            </option>

        </select>

        <!-- DRAWING NOT AVAILABLE -->

        <div
            class="drawing-status">

            <label>

                <input
                    type="checkbox"
                    id="drawingNotAvailable">

                Drawing Not Available

            </label>

        </div>

        <textarea
            id="drawingMissingReason"
            placeholder="Reason if drawing not available">

        </textarea>

        <!-- CHECKLIST -->

        <div
            id="checklistContainer">

        </div>

        <!-- REMARKS -->

        <label>
            Overall Remarks
        </label>

        <textarea
            id="overallRemarks">

        </textarea>

        <button
            id="saveValidationBtn">

            Save Page Validation

        </button>

    </div>

</section>

<!-- ===================================== -->
<!-- REPORTS -->
<!-- ===================================== -->

<section
    class="report-section">

    <h2>
        Reports
    </h2>

    <button
        id="generateReportBtn">

        Generate Reports

    </button>

    <button
        id="exportExcelBtn">

        Export Excel

    </button>

    <div
        id="reportContainer">

    </div>

</section>

<!-- ===================================== -->
<!-- CONFIG -->
<!-- ===================================== -->

<script src="config/checklistConfig.js"></script>

<script src="config/categoryMapping.js"></script>

<!-- ===================================== -->
<!-- CORE -->
<!-- ===================================== -->

<script src="js/pdfViewer.js"></script>

<script src="js/boqParser.js"></script>

<script src="js/boqReview.js"></script>

<script src="js/checklistEngine.js"></script>

<script src="js/validationStore.js"></script>

<script src="js/reportGenerator.js"></script>

<script src="js/excelExport.js"></script>

<script src="js/app.js"></script>

</body>

</html>
