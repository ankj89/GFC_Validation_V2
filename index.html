<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>GFC Validation Tool</title>

    <link rel="stylesheet"
          href="css/style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

</head>

<body>

<header>

    <h1>GFC Validation Tool</h1>

</header>

<section class="upload-section">

    <div class="upload-card">

        <label>
            Upload GFC Docket PDF
        </label>

        <input type="file"
               id="gfcPdfInput"
               accept=".pdf">

    </div>

    <div class="upload-card">

        <label>
            Upload BOQ PDF
        </label>

        <input type="file"
               id="boqPdfInput"
               accept=".pdf">

    </div>

</section>

<section class="main-layout">

    <!-- LEFT -->

    <div class="viewer-panel">

        <div class="viewer-toolbar">

            <button id="prevPageBtn">
                Previous
            </button>

            <span>
                Page
                <span id="currentPage">
                    1
                </span>
                /
                <span id="totalPages">
                    0
                </span>
            </span>

            <button id="nextPageBtn">
                Next
            </button>

        </div>

        <canvas id="pdfCanvas"></canvas>

    </div>

    <!-- RIGHT -->

    <div class="validation-panel">

        <h2>Validation</h2>

        <!-- ROOM -->

        <label>
            Room
        </label>

        <select id="roomDropdown">

            <option value="">
                Select Room
            </option>

        </select>

        <!-- ITEMS -->

        <label>
           Which Item Names are visible in this drawing?
        </label>

        <select id="itemDropdown"
                multiple>

        </select>

        <!-- CATEGORY -->

        <label>
            Drawing Category
        </label>

        <select id="categoryDropdown"
                multiple>

            <option value="falseCeiling">
                False Ceiling
            </option>

            <option value="electrical">
                Electrical
            </option>

            <option value="plumbing">
                Plumbing
            </option>

            <option value="flooring">
                Flooring
            </option>

            <option value="carpentry">
                Carpentry
            </option>

            <option value="elevation">
                Elevation
            </option>

        </select>

        <!-- DRAWING STATUS -->

        <div class="drawing-status">

            <label>

                <input type="checkbox"
                       id="drawingNotAvailable">

                Drawing Not Available

            </label>

        </div>

        <textarea
                id="drawingMissingReason"
                placeholder="Reason if drawing not available">
        </textarea>

        <!-- CHECKLIST -->

        <div id="checklistContainer">

        </div>

        <!-- REMARKS -->

        <label>
            Overall Remarks
        </label>

        <textarea id="overallRemarks">

        </textarea>

        <button id="saveValidationBtn">

            Save Page Validation

        </button>

    </div>

</section>

<!-- REPORT SECTION -->

<section class="report-section">

    <h2>Reports</h2>

    <button id="generateReportBtn">

        Generate Reports

    </button>

    <button id="exportExcelBtn">

        Export Excel

    </button>

    <div id="reportContainer">

    </div>

</section>

<script src="config/checklistConfig.js"></script>
<script src="config/categoryMapping.js"></script>

<script src="js/validationStore.js"></script>
<script src="js/checklistEngine.js"></script>
<script src="js/pdfViewer.js"></script>
<script src="js/boqParser.js"></script>
<script src="js/reportGenerator.js"></script>
<script src="js/excelExport.js"></script>
<script src="js/app.js"></script>

</body>
</html>
