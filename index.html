<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        GFC Validation Tool V4
    </title>

    <link rel="stylesheet"
          href="css/style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

</head>

<body>

<header>

    <h1>
        GFC Validation Tool V4
    </h1>

</header>

<!-- ===================================== -->
<!-- PROJECT SETUP -->
<!-- ===================================== -->

<section class="setup-section">

    <div class="card">

        <h2>
            Project Setup
        </h2>

        <label>
            GFC ID
        </label>

        <input
            type="text"
            id="gfcIdInput">

  <h3>Upload RFV Excel</h3>

<input
    type="file"
    id="rfvExcelInput"
    accept=".xlsx,.xls,.csv">

<hr>

<h3>OR Upload BOQ PDF</h3>

<input
    type="file"
    id="boqPdfInput"
    accept=".pdf">

        <hr>

        <label>
            OR Upload BOQ PDF
        </label>

        <input
            type="file"
            id="boqPdfInput"
            accept=".pdf">

    </div>

</section>

<!-- ===================================== -->
<!-- BOQ REVIEW -->
<!-- ===================================== -->

<section
    id="boqReviewSection"
    class="card hidden">

    <h2>
        BOQ Review
    </h2>

    <table
        id="boqReviewTable"
        class="review-table">

        <thead>

        <tr>

            <th>
                Room
            </th>

            <th>
                Qty
            </th>

            <th>
                Item Name
            </th>

            <th>
                Category
            </th>

            <th>
                Select
            </th>

        </tr>

        </thead>

        <tbody id="boqReviewBody">

        </tbody>

    </table>

    <div class="button-row">

        <button
            id="addRowBtn">

            Add Row

        </button>

        <button
            id="deleteRowBtn">

            Delete Selected Row

        </button>

        <button
            id="saveProjectMasterBtn">

            Save Project Master

        </button>

    </div>

</section>

<!-- ===================================== -->
<!-- VALIDATION SCREEN -->
<!-- ===================================== -->

<section
    id="validationSection"
    class="hidden">

    <div class="main-layout">

        <!-- PDF PANEL -->

        <div class="viewer-panel">

            <div class="viewer-toolbar">

                <button
                    id="prevPageBtn">

                    Previous

                </button>

                <span>

                    Page

                    <span id="currentPage">

                        1

                    </span>

                    /

                    <span id="totalPages">

                        0

                    </span>

                </span>

                <button
                    id="nextPageBtn">

                    Next

                </button>

            </div>

            <canvas id="pdfCanvas">

            </canvas>

            <div class="upload-area">

                <label>
                    Upload GFC PDF
                </label>

                <input
                    type="file"
                    id="gfcPdfInput"
                    accept=".pdf">

            </div>

        </div>

        <!-- VALIDATION PANEL -->

        <div class="validation-panel">

            <h2>
                Validation
            </h2>

            <!-- ROOM -->

            <label>
                Room
            </label>

            <select
                id="roomDropdown">

            </select>

            <!-- ITEMS -->

            <label>
                Visible Items
            </label>

            <select
                id="itemDropdown"
                multiple>

            </select>

            <!-- CATEGORY -->

            <label>
                Drawing Category
            </label>

            <select
                id="categoryDropdown"
                multiple>

            </select>

            <!-- EXTRA ITEMS -->

            <label>
                Drawing Shows Item Not In BOQ
            </label>

            <div
                id="extraItemsContainer">

            </div>

            <button
                id="addExtraItemBtn">

                Add Extra Item

            </button>

            <!-- DRAWING STATUS -->

            <div class="drawing-status">

                <label>

                    <input
                        type="checkbox"
                        id="drawingNotAvailable">

                    Drawing Not Available

                </label>

            </div>

            <textarea
                id="drawingMissingReason"
                placeholder="Reason">

            </textarea>

            <!-- CHECKLIST -->

            <div
                id="checklistContainer">

            </div>

            <!-- REMARKS -->

            <label>
                Overall Remarks
            </label>

            <textarea
                id="overallRemarks">

            </textarea>

            <button
                id="saveValidationBtn">

                Save Page Validation

            </button>

        </div>

    </div>

</section>

<!-- ===================================== -->
<!-- REPORTS -->
<!-- ===================================== -->

<section
    class="report-section">

    <h2>
        Reports
    </h2>

    <button
        id="generateReportBtn">

        Generate Reports

    </button>

    <button
        id="exportExcelBtn">

        Export Excel

    </button>

    <div
        id="reportContainer">

    </div>

</section>

<script src="config/checklistConfig.js"></script>

<script src="js/projectFetcher.js"></script>
<script src="js/projectMasterBuilder.js"></script>

<script src="js/pdfViewer.js"></script>

<script src="js/checklistEngine.js"></script>

<script src="js/validationStore.js"></script>

<script src="js/reportGenerator.js"></script>

<script src="js/excelExport.js"></script>

<script src="js/app.js"></script>

</body>

</html>
